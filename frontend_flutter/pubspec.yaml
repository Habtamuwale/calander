name: frontend_flutter
description: Event Scheduler with Complex Recurrence Patterns
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  syncfusion_flutter_calendar: ^32.2.9
  intl: ^0.20.2
  http: ^1.2.1
  provider: ^6.1.2
  timezone: ^0.11.0
  google_sign_in: 5.4.0
  googleapis: any
  googleapis_auth: ^2.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.13  # ✅ updated version
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^17.0.0
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/ringtone.mp3

dependency_overrides:
  timezone: ^0.11.0
